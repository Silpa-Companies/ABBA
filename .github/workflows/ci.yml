name: ABBA CI
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 11

jobs:
  ci:
    name: Install, Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @abba/database generate

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test --if-present
        env:
          CI: true

      - name: Build
        run: pnpm -r build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Upload web build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: apps/web/.next
          retention-days: 3

  # ── Secret-scanning placeholder
  # TODO ABBA-19: replace this job with the real secret-scanning action once
  # Developer 1 has chosen the scanner (e.g. trufflesecurity/trufflehog-actions-scan
  # or gitleaks/gitleaks-action). This stub keeps the required-status-check name
  secret-scan:
    name: Secret Scanning (ABBA-19)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed by most scanners

